name: Flutter Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      CARGO_EXPAND_VERSION: 1.0.95
      FLUTTER_VERSION: 3.24.0
      FLUTTER_RUST_BRIDGE_VERSION: 1.80.1
      RUST_VERSION: 1.75
      CARGO_HOME: /home/runner/.cargo
      CARGO_INCREMENTAL: 0
      CARGO_TERM_COLOR: always
      CACHE_ON_FAILURE: false
      FLUTTER_ROOT: /opt/hostedtoolcache/flutter/stable-3.24.0-x64/flutter
      PUB_CACHE: /home/runner/.pub-cache
      PUB_ENVIRONMENT: bot.github
      PUB_ALLOW_PRERELEASE_SDK: false
      FLUTTER_STORAGE_BASE_URL: https://storage.flutter-io.cn
      PUB_HOSTED_URL: https://pub.flutter-io.cn

    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
      
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          override: true
          components: rustfmt, clippy
      
      - name: Install cargo tools
        run: |
          cargo install cargo-expand --version ${{ env.CARGO_EXPAND_VERSION }} --locked
          cargo install flutter_rust_bridge_codegen --version ${{ env.FLUTTER_RUST_BRIDGE_VERSION }} --features "uuid" --locked
      
      - name: Clean pub cache and temp files
        run: |
          flutter pub cache clean
          rm -rf $PUB_CACHE/hosted/pub.dartlang.org/.cache
          rm -rf $PUB_CACHE/hosted/pub.dev/.cache
        continue-on-error: true
      
      - name: Get Flutter dependencies with retry
        run: |
          pushd flutter
          sed -i -e 's/extended_text: 14.0.0/extended_text: 13.0.0/g' pubspec.yaml
          
          for i in {1..3}; do
            echo "Attempt $i of 3..."
            if flutter pub get --no-precompile 2>&1 | tee pub_output.log; then
              echo "Dependencies resolved successfully"
              break
            else
              echo "Attempt $i failed"
              if [ $i -lt 3 ]; then
                echo "Cleaning cache and retrying..."
                flutter pub cache clean
                rm -rf .dart_tool
                rm -rf pubspec.lock
                sleep 5
              else
                echo "All attempts failed. Showing error log:"
                cat pub_output.log
                exit 1
              fi
            fi
          done
          
          popd
      
      - name: Verify dependencies
        run: |
          pushd flutter
          flutter pub deps
          popd
      
      - name: Build Flutter app
        run: |
          pushd flutter
          flutter build apk --release
          popd
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v3
        if: success()
        with:
          name: rustdesk-apk
          path: flutter/build/app/outputs/flutter-apk/*.apk
          retention-days: 7
