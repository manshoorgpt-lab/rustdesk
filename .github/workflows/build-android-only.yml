name: Build Android Only

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.5'

      - name: Setup vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git
          ./vcpkg/bootstrap-vcpkg.sh
          echo "VCPKG_ROOT=${{ github.workspace }}/vcpkg" >> $GITHUB_ENV

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: '1.75'
          targets: aarch64-linux-android

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26c

      - name: Build Android APK
        run: |
          cd flutter
          flutter pub get
          # استفاده از debug signing (بدون نیاز به keystore)
          sed -i "s/signingConfigs.release/signingConfigs.debug/g" android/app/build.gradle
          flutter build apk --release --split-per-abi
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-android
          path: flutter/build/app/outputs/flutter-apk/*.apk
