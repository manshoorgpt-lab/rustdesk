name: Build Android APK

on:
  workflow_dispatch:

jobs:
  generate-bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.5'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: '1.75'

      - name: Add flutter_rust_bridge dependency
        run: |
          cd flutter
          if ! grep -q "flutter_rust_bridge_codegen" pubspec.yaml; then
            sed -i '/dev_dependencies:/a\  flutter_rust_bridge_codegen: ^1.80.1' pubspec.yaml
          fi
          flutter pub get

      - name: Generate bridge files
        run: |
          cd flutter
          dart run flutter_rust_bridge_codegen:codegen \
            --rust-input ./../src/flutter_ffi.rs \
            --dart-output ./lib/generated_bridge.dart

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-artifact
          path: ./flutter/lib/generated_bridge.dart

  build-android:
    needs: generate-bridge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download bridge artifact
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: ./flutter/lib/

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.5'

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26c

      - name: Build Android APK
        run: |
          cd flutter
          flutter pub get
          sed -i "s/signingConfigs.release/signingConfigs.debug/g" android/app/build.gradle
          flutter build apk --release --split-per-abi
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-android
          path: flutter/build/app/outputs/flutter-apk/*.apk
